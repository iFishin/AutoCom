version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "02:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      major-updates:
        update-types: ["major"]
        labels: ["major-update"]
      minor-patch:
        update-types: ["minor", "patch"]
        labels: ["minor-patch-update"]
    ignore:
      - dependency-name: "pytest"
        versions: [">=7.0.0"]
      - dependency-name: "black"
        update-types: ["version-update:semver-major"]
    pull-request-branch-name:
      separator: "-"
    reviewers:
      - "iFishin"

  # GitHub Actions 依赖
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "02:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "actions"
      - "dependencies"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
    reviewers:
      - "iFishin"